<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>

  <!-- Wind lines (left side, car moving right) -->
  <line x1="1" y1="10" x2="8" y2="10" stroke="#44ccff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="2" y1="14" x2="7" y2="14" stroke="#44ccff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="1" y1="18" x2="9" y2="18" stroke="#44ccff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="3" y1="22" x2="8" y2="22" stroke="#44ccff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Car body (top-down view, facing right) -->
  <rect x="10" y="9" width="18" height="14" rx="2" fill="#c24040"/>

  <!-- Windshield (front, right side) -->
  <rect x="24" y="11" width="3" height="10" rx="1" fill="#88ccee" opacity="0.85"/>

  <!-- Rear window (left side) -->
  <rect x="11" y="11.5" width="3" height="9" rx="1" fill="#557799" opacity="0.7"/>

  <!-- Roof highlight -->
  <rect x="14" y="10.5" width="9" height="11" rx="1" fill="#d45050" opacity="0.5"/>

  <!-- Wheels -->
  <rect x="11" y="8"  width="5" height="3" rx="1.5" fill="#222233"/>
  <rect x="20" y="8"  width="5" height="3" rx="1.5" fill="#222233"/>
  <rect x="11" y="21" width="5" height="3" rx="1.5" fill="#222233"/>
  <rect x="20" y="21" width="5" height="3" rx="1.5" fill="#222233"/>

  <!-- Headlight glow -->
  <rect x="28" y="12" width="2" height="3" rx="1" fill="#ffee88" opacity="0.9"/>
  <rect x="28" y="17" width="2" height="3" rx="1" fill="#ffee88" opacity="0.9"/>
</svg>
